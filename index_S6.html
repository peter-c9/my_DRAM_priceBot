<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業硬體與股市報價動態系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; }
        
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            padding: 20px;
            margin: 0;
            transition: all 0.3s;
        }
        .container { 
            max-width: 1300px; 
            margin: 0 auto; 
        }

        h1 {
            text-align: center;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            margin-bottom: 20px;
        }
        .panel {
            background-color: #1e1e1e; 
            padding: 20px; 
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8); 
            margin-bottom: 20px;
            border-left: 5px solid #f1c40f;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .setting-group {
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 18px;
            background-color: #2a2a2a; 
            padding: 10px 20px; 
            border-radius: 5px;
            border: 1px solid #00ffff;
        }
        .setting-group label {
            color: #00ffff;
            font-weight: bold;
        }
        
        /* 針對股市選單的專屬顏色標示 */
        .stock-group { border-color: #ff00ff; }
        .stock-group label { color: #ff00ff; }

        select, input[type="number"] {
            background-color: #121212;
            color: #f1c40f;
            border: 1px solid #555;
            padding: 8px 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            outline: none;
            text-align: center;
        }
        select:focus { border-color: #00ffff; }
        
        .ma-group { border-color: #ff6600; }
        .ma-group label { color: #ff6600; }
        .ma-group input[type="number"] { color: #ff6600; width: 80px; }
        .ma-group input[type="number"]:focus { border-color: #ff6600; }

        .btn {
            background-color: #3498db; 
            color: white; 
            border: none;
            padding: 12px 20px; 
            border-radius: 5px; 
            cursor: pointer;
            font-size: 16px; 
            font-weight: bold; 
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .btn:hover { background-color: #2980b9; transform: translateY(-2px); }
        .btn-warning { background-color: #e67e22; }
        .btn-warning:hover { background-color: #d35400; }

        .chart-wrapper {
            background-color: #1a1a1a;
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            padding: 20px 15px; 
            width: 100%;
            height: 65vh;
            position: relative;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 DRAM & GPU 專業報價雙軸觀測台</h1>
        
        <div class="panel">
            <!-- 1. 主分析標的 (左軸) -->
            <div class="setting-group">
                <label for="productSelect">🎯 主標的:</label>
                <select id="productSelect" onchange="loadChartData()">
                    <optgroup label="AI 伺服器 GPU">
                        <option value="H100">NVIDIA H100</option>
                        <option value="H200">NVIDIA H200</option>
                        <option value="B200">NVIDIA B200</option>
                        <option value="A100">NVIDIA A100</option>
                        <option value="5090">RTX 5090</option>
                    </optgroup>
                    <optgroup label="大盤價格指數">
                        <option value="DRAM Idx">DRAM 大盤指數</option>
                        <option value="NAND Idx">NAND 大盤指數</option>
                    </optgroup>
                    <optgroup label="記憶體顆粒">
                        <option value="D4 16G 3200">D4 16G 3200</option>
                        <option value="D4 8G 3200">D4 8G 3200</option>
                        <option value="D4 8G eTT">D4 8G eTT</option>
                        <option value="D5 16G 4800">D5 16G 4800</option>
                    </optgroup>
                </select>
            </div>

            <!-- 2. 股市對比標的 (右軸) -->
            <div class="setting-group stock-group">
                <label for="stockSelect">📈 對比股市:</label>
                <select id="stockSelect" onchange="loadChartData()">
                    <option value="none">無 (單一顯示)</option>
                    <option value="NVDA">NVIDIA 股票 (NVDA)</option>
                    <option value="DRAM_ETF">半導體 ETF (SMH)</option>
                </select>
            </div>

            <!-- 3. 共用的均線週期設定 -->
            <div class="setting-group ma-group">
                <label for="maPeriodInput">📉 均線週期 (SMA):</label>
                <input type="number" id="maPeriodInput" value="5" min="1" max="100" oninput="loadChartData()">
            </div>
            
            <button class="btn" onclick="changeFontSize(2)">A+ 放大字體</button>
            <button class="btn btn-warning" onclick="changeFontSize(-2)">A- 縮小字體</button>
        </div>

        <div class="chart-wrapper">
            <canvas id="priceChart"></canvas>
        </div>
    </div>

    <script>
        let myChart = null;
        let globalFontSize = 16; 

        // 獨立的 SMA 計算公式
        function calculateSMA(data, period) {
            let sma = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period - 1) {
                    sma.push(null);
                } else {
                    let sum = 0;
                    for (let j = 0; j < period; j++) {
                        sum += data[i - j];
                    }
                    sma.push(Number((sum / period).toFixed(2))); 
                }
            }
            return sma;
        }

        function changeFontSize(delta) {
            globalFontSize += delta;
            if (globalFontSize < 10) globalFontSize = 10;
            if (globalFontSize > 36) globalFontSize = 36;
            loadChartData(); // 重新讀取與繪製
        }

        async function loadChartData() {
            const primaryProduct = document.getElementById('productSelect').value;
            const secondaryProduct = document.getElementById('stockSelect').value;
            const maPeriod = parseInt(document.getElementById('maPeriodInput').value) || 5;
            
            let primaryDates = [];
            let primaryPrices = [];
            let alignedSecondaryPrices = [];
            let alignedSecondarySMA = [];

            try {
                // 1. 抓取主要硬體報價
                const res1 = await fetch(`報價資料夾/${primaryProduct}.csv`);
                if (!res1.ok) throw new Error(`找不到 ${primaryProduct} 的歷史資料。`);

                const text1 = await res1.text();
                const lines1 = text1.trim().split('\n');
                
                for (let i = 1; i < lines1.length; i++) {
                    const cols = lines1[i].split(',');
                    if (cols.length >= 2) {
                        primaryDates.push(cols[0].trim()); 
                        primaryPrices.push(parseFloat(cols[1].trim())); 
                    }
                }

                // 2. 如果有選擇股市對比，則抓取股市資料
                if (secondaryProduct !== "none") {
                    try {
                        const res2 = await fetch(`報價資料夾/${secondaryProduct}.csv`);
                        if (res2.ok) {
                            const text2 = await res2.text();
                            const lines2 = text2.trim().split('\n');
                            
                            let stockDates = [];
                            let stockPrices = [];
                            
                            for (let i = 1; i < lines2.length; i++) {
                                const cols = lines2[i].split(',');
                                if (cols.length >= 2) {
                                    stockDates.push(cols[0].trim());
                                    stockPrices.push(parseFloat(cols[1].trim()));
                                }
                            }

                            // 針對連續的股市資料計算其獨立的 SMA
                            const stockSMA = calculateSMA(stockPrices, maPeriod);

                            // 建立字典，以便將股市日期與主要硬體日期對齊 (因為股市週末不開盤)
                            let priceMap = {};
                            let smaMap = {};
                            for (let i = 0; i < stockDates.length; i++) {
                                priceMap[stockDates[i]] = stockPrices[i];
                                smaMap[stockDates[i]] = stockSMA[i];
                            }

                            // 依照硬體的日期，把對應的股市價格跟均線排進去，如果週末沒開盤則補 null 斷線
                            alignedSecondaryPrices = primaryDates.map(d => priceMap[d] !== undefined ? priceMap[d] : null);
                            alignedSecondarySMA = primaryDates.map(d => smaMap[d] !== undefined ? smaMap[d] : null);
                        }
                    } catch (e) {
                        console.warn("股市資料讀取失敗或檔案尚不存在", e);
                    }
                }

                // 繪製圖表
                renderChart(primaryProduct, secondaryProduct, primaryDates, primaryPrices, alignedSecondaryPrices, alignedSecondarySMA, maPeriod);

            } catch (error) {
                alert(error.message);
                if (myChart) myChart.destroy();
            }
        }

        function renderChart(label1, label2, dates, prices1, prices2, sma2, maPeriod) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            if (myChart) myChart.destroy();

            const smaData1 = calculateSMA(prices1, maPeriod);

            let gradient = ctx.createLinearGradient(0, 0, 0, 600);
            gradient.addColorStop(0, 'rgba(0, 255, 255, 0.5)'); 
            gradient.addColorStop(1, 'rgba(0, 255, 255, 0.0)');

            // 基礎資料集：硬體報價與其均線 (對應左側 Y 軸)
            let datasets = [
                {
                    label: `${label1} (主軸)`,
                    data: prices1,
                    borderColor: '#00ffff',     
                    backgroundColor: gradient,  
                    borderWidth: 4,             
                    pointBackgroundColor: '#121212', 
                    pointBorderColor: '#00ffff',     
                    pointBorderWidth: 3,
                    pointRadius: 5,             
                    pointHoverRadius: 10,       
                    pointHoverBackgroundColor: '#f1c40f', 
                    fill: true,
                    tension: 0.1,
                    yAxisID: 'y', // 指定左軸
                    order: 4 
                },
                {
                    label: `${label1} SMA(${maPeriod})`,
                    data: smaData1,
                    borderColor: '#ff6600', 
                    borderWidth: 5,         
                    pointRadius: 0,         
                    pointHoverRadius: 7,    
                    fill: false,
                    tension: 0.4,           
                    yAxisID: 'y', // 指定左軸
                    spanGaps: true,
                    order: 3 
                }
            ];

            // 若有選擇股市資料，則動態加入圖表中 (對應右側 Y1 軸)
            if (label2 !== "none") {
                datasets.push({
                    label: `${label2} (對比軸)`,
                    data: prices2,
                    borderColor: '#ff00ff', // 紫紅色做明顯區別
                    borderWidth: 3,
                    borderDash: [5, 5], // 價格線用虛線呈現對比感
                    pointBackgroundColor: '#121212',
                    pointBorderColor: '#ff00ff',
                    pointRadius: 4,
                    pointHoverRadius: 8,
                    fill: false,
                    tension: 0.1,
                    yAxisID: 'y1', // 指定右軸
                    spanGaps: true, // 允許跨過週末不斷線
                    order: 2
                });

                datasets.push({
                    label: `${label2} SMA(${maPeriod})`,
                    data: sma2,
                    borderColor: '#a200ff', // 深紫色均線
                    borderWidth: 4,
                    pointRadius: 0,
                    pointHoverRadius: 7,
                    fill: false,
                    tension: 0.4,
                    yAxisID: 'y1', // 指定右軸
                    spanGaps: true, // 允許跨過週末不斷線
                    order: 1
                });
            }

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: {
                            labels: {
                                color: '#e0e0e0',
                                font: { size: globalFontSize, weight: 'bold', family: '"Microsoft JhengHei", sans-serif' }
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(20, 20, 20, 0.95)',
                            borderColor: '#333',
                            borderWidth: 2,
                            titleColor: '#f1c40f', 
                            bodyColor: '#ffffff',  
                            titleFont: { size: globalFontSize, weight: 'bold' },
                            bodyFont: { size: globalFontSize + 2, weight: 'bold' }, 
                            padding: 15,
                            usePointStyle: true,
                            callbacks: {
                                label: function(context) {
                                    return `  ${context.dataset.label}： ${context.parsed.y} $`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: function(context) {
                                    if (context.index > 0) {
                                        const curr = dates[context.index];
                                        const prev = dates[context.index - 1];
                                        if (curr && prev && curr.substring(0, 7) !== prev.substring(0, 7)) {
                                            return 'rgba(255, 255, 255, 0.7)';
                                        }
                                    }
                                    return '#333333';
                                },
                                lineWidth: function(context) {
                                    if (context.index > 0) {
                                        const curr = dates[context.index];
                                        const prev = dates[context.index - 1];
                                        if (curr && prev && curr.substring(0, 7) !== prev.substring(0, 7)) return 2;
                                    }
                                    return 1;
                                },
                                borderDash: function(context) {
                                    if (context.index > 0) {
                                        const curr = dates[context.index];
                                        const prev = dates[context.index - 1];
                                        if (curr && prev && curr.substring(0, 7) !== prev.substring(0, 7)) return [6, 6];
                                    }
                                    return [];
                                },
                                drawOnChartArea: true
                            },
                            ticks: {
                                color: '#e0e0e0',
                                font: { size: globalFontSize, weight: 'bold' },
                                maxRotation: 0,
                                minRotation: 0,
                                autoSkip: true,
                                maxTicksLimit: 40,
                                callback: function(value, index) {
                                    const dateStr = dates[index];
                                    if (!dateStr) return '';
                                    const parts = dateStr.split('-');
                                    if (parts.length !== 3) return dateStr;
                                    const yearMonth = `${parts[0]}-${parts[1]}`;
                                    const day = parts[2];
                                    if (index === 0) return [day, yearMonth];
                                    const prevDateStr = dates[index - 1];
                                    if (!prevDateStr) return [day, yearMonth];
                                    const prevYearMonth = prevDateStr.substring(0, 7);
                                    if (yearMonth !== prevYearMonth) return [day, yearMonth];
                                    else return [day, ''];
                                }
                            }
                        },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: {
                                display: true,
                                text: '硬體報價 (左軸)',
                                color: '#00ffff',
                                font: { size: globalFontSize, weight: 'bold' }
                            },
                            grid: { color: '#333333', borderDash: [5, 5] },
                            ticks: {
                                color: '#00ffff', 
                                font: { size: globalFontSize, weight: 'bold' }
                            }
                        },
                        y1: {
                            type: 'linear',
                            display: (label2 !== "none"), // 只有在有選擇股市時才顯示右軸
                            position: 'right',
                            title: {
                                display: true,
                                text: '股市報價 (右軸)',
                                color: '#ff00ff',
                                font: { size: globalFontSize, weight: 'bold' }
                            },
                            grid: { drawOnChartArea: false }, // 右軸不畫網格，避免與左軸網格打架變混亂
                            ticks: {
                                color: '#ff00ff',
                                font: { size: globalFontSize, weight: 'bold' }
                            }
                        }
                    }
                }
            });
        }

        window.addEventListener('DOMContentLoaded', loadChartData);
    </script>
</body>
</html>
