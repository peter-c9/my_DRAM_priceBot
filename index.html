<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業硬體報價動態系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; }
        
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            padding: 20px;
            margin: 0;
            transition: all 0.3s;
        }
        .container { 
            max-width: 1300px; 
            margin: 0 auto; 
        }

        h1 {
            text-align: center;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            margin-bottom: 20px;
        }
        .panel {
            background-color: #1e1e1e; 
            padding: 20px; 
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8); 
            margin-bottom: 20px;
            border-left: 5px solid #f1c40f;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .setting-group {
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 18px;
            background-color: #2a2a2a; 
            padding: 10px 20px; 
            border-radius: 5px;
            border: 1px solid #00ffff;
        }
        .setting-group label {
            color: #00ffff;
            font-weight: bold;
        }
        select, input[type="number"] {
            background-color: #121212;
            color: #f1c40f;
            border: 1px solid #555;
            padding: 8px 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            outline: none;
            text-align: center;
        }
        select:focus { border-color: #00ffff; }
        
        .ma-group { border-color: #ff6600; }
        .ma-group label { color: #ff6600; }
        .ma-group input[type="number"] { color: #ff6600; width: 80px; }
        .ma-group input[type="number"]:focus { border-color: #ff6600; }

        .btn {
            background-color: #3498db; 
            color: white; 
            border: none;
            padding: 12px 20px; 
            border-radius: 5px; 
            cursor: pointer;
            font-size: 16px; 
            font-weight: bold; 
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .btn:hover { background-color: #2980b9; transform: translateY(-2px); }
        .btn-warning { background-color: #e67e22; }
        .btn-warning:hover { background-color: #d35400; }

        .chart-wrapper {
            background-color: #1a1a1a;
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            padding: 20px 15px; 
            width: 100%;
            height: 65vh;
            position: relative;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 DRAM & GPU 專業報價觀測台</h1>
        
        <div class="panel">
            <div class="setting-group">
                <label for="productSelect">🎯 分析標的:</label>
                <select id="productSelect" onchange="loadChartData()">
                    <optgroup label="AI 伺服器 GPU">
                        <option value="H100">NVIDIA H100</option>
                        <option value="H200">NVIDIA H200</option>
                        <option value="B200">NVIDIA B200</option>
                        <option value="A100">NVIDIA A100</option>
                        <option value="5090">RTX 5090</option>
                    </optgroup>
                    <optgroup label="大盤價格指數">
                        <option value="DRAM Idx">DRAM 大盤指數</option>
                        <option value="NAND Idx">NAND 大盤指數</option>
                    </optgroup>
                    <optgroup label="記憶體顆粒">
                        <option value="D4 16G 3200">D4 16G 3200</option>
                        <option value="D4 8G 3200">D4 8G 3200</option>
                        <option value="D4 8G eTT">D4 8G eTT</option>
                        <option value="D5 16G 4800">D5 16G 4800</option>
                    </optgroup>
                </select>
            </div>

            <div class="setting-group ma-group">
                <label for="maPeriodInput">📈 均線週期 (SMA):</label>
                <input type="number" id="maPeriodInput" value="5" min="1" max="100" oninput="updateChartDisplay()">
            </div>
            
            <button class="btn" onclick="changeFontSize(2)">A+ 放大字體</button>
            <button class="btn btn-warning" onclick="changeFontSize(-2)">A- 縮小字體</button>
        </div>

        <div class="chart-wrapper">
            <canvas id="priceChart"></canvas>
        </div>
    </div>

    <script>
        let myChart = null;
        let globalFontSize = 16; 
        let currentDates = [];
        let currentPrices = [];
        let currentProductName = "";

        function calculateSMA(data, period) {
            let sma = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period - 1) {
                    sma.push(null);
                } else {
                    let sum = 0;
                    for (let j = 0; j < period; j++) {
                        sum += data[i - j];
                    }
                    sma.push(Number((sum / period).toFixed(2))); 
                }
            }
            return sma;
        }

        function updateChartDisplay() {
            if (currentDates.length > 0) {
                renderChart(currentProductName, currentDates, currentPrices);
            }
        }

        function changeFontSize(delta) {
            globalFontSize += delta;
            if (globalFontSize < 10) globalFontSize = 10;
            if (globalFontSize > 36) globalFontSize = 36;
            updateChartDisplay();
        }

        async function loadChartData() {
            currentProductName = document.getElementById('productSelect').value;
            const csvUrl = `報價資料夾/${currentProductName}.csv`; 

            try {
                const response = await fetch(csvUrl);
                if (!response.ok) throw new Error(`找不到 ${currentProductName} 的歷史資料。`);

                const csvText = await response.text();
                const lines = csvText.trim().split('\n');
                
                currentDates = [];
                currentPrices = [];

                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(',');
                    if (cols.length >= 2) {
                        currentDates.push(cols[0].trim()); 
                        currentPrices.push(parseFloat(cols[1].trim())); 
                    }
                }
                updateChartDisplay(); 

            } catch (error) {
                alert(error.message);
                if (myChart) myChart.destroy();
            }
        }

        function renderChart(label, dates, prices) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            if (myChart) myChart.destroy();

            const maPeriod = parseInt(document.getElementById('maPeriodInput').value) || 5;
            const smaData = calculateSMA(prices, maPeriod);

            let gradient = ctx.createLinearGradient(0, 0, 0, 600);
            gradient.addColorStop(0, 'rgba(0, 255, 255, 0.5)'); 
            gradient.addColorStop(1, 'rgba(0, 255, 255, 0.0)');

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [
                        {
                            label: `${label} (單位: USD)`,
                            data: prices,
                            borderColor: '#00ffff',     
                            backgroundColor: gradient,  
                            borderWidth: 4,             
                            pointBackgroundColor: '#121212', 
                            pointBorderColor: '#00ffff',     
                            pointBorderWidth: 3,
                            pointRadius: 5,             
                            pointHoverRadius: 10,       
                            pointHoverBackgroundColor: '#f1c40f', 
                            pointHoverBorderColor: '#fff',
                            fill: true,
                            tension: 0.1,
                            order: 2 
                        },
                        {
                            label: `SMA (${maPeriod}) 均線`,
                            data: smaData,
                            borderColor: '#ff6600', 
                            borderWidth: 5,         
                            pointRadius: 0,         
                            pointHoverRadius: 7,    
                            pointBackgroundColor: '#121212',
                            pointHoverBackgroundColor: '#ff6600',
                            fill: false,
                            tension: 0.4,           
                            order: 1 
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: {
                            labels: {
                                color: '#e0e0e0',
                                font: { size: globalFontSize + 4, weight: 'bold', family: '"Microsoft JhengHei", sans-serif' }
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(20, 20, 20, 0.95)',
                            borderColor: '#333',
                            borderWidth: 2,
                            titleColor: '#f1c40f', 
                            bodyColor: '#ffffff',  
                            titleFont: { size: globalFontSize + 2, weight: 'bold' },
                            bodyFont: { size: globalFontSize + 4, weight: 'bold' }, 
                            padding: 15,
                            usePointStyle: true,
                            callbacks: {
                                label: function(context) {
                                    return `  ${context.dataset.label}： ${context.parsed.y} $`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                // 動態設定網格線顏色：遇到換月時變成白色
                                color: function(context) {
                                    if (context.index > 0) {
                                        const curr = dates[context.index];
                                        const prev = dates[context.index - 1];
                                        if (curr && prev && curr.substring(0, 7) !== prev.substring(0, 7)) {
                                            return 'rgba(255, 255, 255, 0.7)'; // 換月白線
                                        }
                                    }
                                    return '#333333'; // 預設暗色網格
                                },
                                // 動態設定網格線寬與樣式
                                lineWidth: function(context) {
                                    if (context.index > 0) {
                                        const curr = dates[context.index];
                                        const prev = dates[context.index - 1];
                                        if (curr && prev && curr.substring(0, 7) !== prev.substring(0, 7)) {
                                            return 2; // 換月線條加粗
                                        }
                                    }
                                    return 1;
                                },
                                borderDash: function(context) {
                                    if (context.index > 0) {
                                        const curr = dates[context.index];
                                        const prev = dates[context.index - 1];
                                        if (curr && prev && curr.substring(0, 7) !== prev.substring(0, 7)) {
                                            return [6, 6]; // 換月變虛線
                                        }
                                    }
                                    return [];
                                },
                                drawOnChartArea: true
                            },
                            ticks: {
                                color: '#e0e0e0',
                                font: { size: globalFontSize, weight: 'bold' },
                                maxRotation: 0, // 強制標籤不旋轉（水平顯示）
                                minRotation: 0,
                                autoSkip: true,
                                maxTicksLimit: 40,
                                // 動態回傳陣列來達成「換行顯示」的效果
                                callback: function(value, index) {
                                    const dateStr = dates[index];
                                    if (!dateStr) return '';
                                    
                                    const parts = dateStr.split('-');
                                    if (parts.length !== 3) return dateStr;
                                    
                                    const yearMonth = `${parts[0]}-${parts[1]}`;
                                    const day = parts[2];
                                    
                                    if (index === 0) {
                                        return [day, yearMonth];
                                    }
                                    
                                    const prevDateStr = dates[index - 1];
                                    if (!prevDateStr) return [day, yearMonth];

                                    const prevYearMonth = prevDateStr.substring(0, 7);
                                    
                                    // 若本筆資料與前一筆「月份不同」，則第二行顯示年月，否則第二行留空白對齊
                                    if (yearMonth !== prevYearMonth) {
                                        return [day, yearMonth];
                                    } else {
                                        return [day, ''];
                                    }
                                }
                            }
                        },
                        y: {
                            grid: { color: '#333333', borderDash: [5, 5] },
                            ticks: {
                                color: '#00ffff', 
                                font: { size: globalFontSize + 2, weight: 'bold' },
                                callback: function(value) { return value + ' $'; }
                            }
                        }
                    }
                }
            });
        }

        window.addEventListener('DOMContentLoaded', loadChartData);
    </script>
</body>
</html>
