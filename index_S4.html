<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業硬體報價動態系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; }
        
        /* 基礎暗色模式設定 */
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            padding: 20px;
            margin: 0;
            transition: all 0.3s;
        }
        .container { 
            max-width: 1300px; 
            margin: 0 auto; 
        }

        /* 標題與控制面板 */
        h1 {
            text-align: center;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            margin-bottom: 20px;
        }
        .panel {
            background-color: #1e1e1e; 
            padding: 20px; 
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8); 
            margin-bottom: 20px;
            border-left: 5px solid #f1c40f;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        /* 下拉選單與按鈕設計 */
        .setting-group {
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 18px;
            background-color: #2a2a2a; 
            padding: 10px 20px; 
            border-radius: 5px;
            border: 1px solid #00ffff;
        }
        .setting-group label {
            color: #00ffff;
            font-weight: bold;
        }
        select, input[type="number"] {
            background-color: #121212;
            color: #f1c40f;
            border: 1px solid #555;
            padding: 8px 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            outline: none;
            text-align: center;
        }
        select:focus { border-color: #00ffff; }
        
        /* 均線輸入框特別配色 */
        .ma-group {
            border-color: #ff6600;
        }
        .ma-group label {
            color: #ff6600;
        }
        .ma-group input[type="number"] {
            color: #ff6600;
            width: 80px;
        }
        .ma-group input[type="number"]:focus {
            border-color: #ff6600;
        }

        .btn {
            background-color: #3498db; 
            color: white; 
            border: none;
            padding: 12px 20px; 
            border-radius: 5px; 
            cursor: pointer;
            font-size: 16px; 
            font-weight: bold; 
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .btn:hover { background-color: #2980b9; transform: translateY(-2px); }
        .btn-warning { background-color: #e67e22; }
        .btn-warning:hover { background-color: #d35400; }

        /* 圖表顯示區 */
        .chart-wrapper {
            background-color: #1a1a1a;
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            padding: 20px 15px; 
            width: 100%;
            height: 65vh;
            position: relative;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 DRAM & GPU 專業報價觀測台</h1>
        
        <div class="panel">
            <div class="setting-group">
                <label for="productSelect">🎯 分析標的:</label>
                <select id="productSelect" onchange="loadChartData()">
                    <optgroup label="AI 伺服器 GPU">
                        <option value="H100">NVIDIA H100</option>
                        <option value="H200">NVIDIA H200</option>
                        <option value="B200">NVIDIA B200</option>
                        <option value="A100">NVIDIA A100</option>
                        <option value="5090">RTX 5090</option>
                    </optgroup>
                    <optgroup label="大盤價格指數">
                        <option value="DRAM Idx">DRAM 大盤指數</option>
                        <option value="NAND Idx">NAND 大盤指數</option>
                    </optgroup>
                    <optgroup label="記憶體顆粒">
                        <option value="D4 16G 3200">D4 16G 3200</option>
                        <option value="D4 8G 3200">D4 8G 3200</option>
                        <option value="D4 8G eTT">D4 8G eTT</option>
                        <option value="D5 16G 4800">D5 16G 4800</option>
                    </optgroup>
                </select>
            </div>

            <div class="setting-group ma-group">
                <label for="maPeriodInput">📈 均線週期 (SMA):</label>
                <input type="number" id="maPeriodInput" value="5" min="1" max="100" oninput="updateChartDisplay()">
            </div>
            
            <button class="btn" onclick="changeFontSize(2)">A+ 放大字體</button>
            <button class="btn btn-warning" onclick="changeFontSize(-2)">A- 縮小字體</button>
        </div>

        <div class="chart-wrapper">
            <canvas id="priceChart"></canvas>
        </div>
    </div>

    <script>
        let myChart = null;
        let globalFontSize = 16; 
        let currentDates = [];
        let currentPrices = [];
        let currentProductName = "";

        // 計算簡單移動平均線 (SMA) 的演算法
        function calculateSMA(data, period) {
            let sma = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period - 1) {
                    // 天數不足時填補 null，畫圖時就不會顯示線條
                    sma.push(null);
                } else {
                    let sum = 0;
                    for (let j = 0; j < period; j++) {
                        sum += data[i - j];
                    }
                    sma.push(Number((sum / period).toFixed(2))); // 保留兩位小數
                }
            }
            return sma;
        }

        // 當字體或均線數字改變時，只重繪圖表，不重新下載 CSV
        function updateChartDisplay() {
            if (currentDates.length > 0) {
                renderChart(currentProductName, currentDates, currentPrices);
            }
        }

        function changeFontSize(delta) {
            globalFontSize += delta;
            if (globalFontSize < 10) globalFontSize = 10;
            if (globalFontSize > 36) globalFontSize = 36;
            updateChartDisplay();
        }

        async function loadChartData() {
            currentProductName = document.getElementById('productSelect').value;
            const csvUrl = `報價資料夾/${currentProductName}.csv`; 

            try {
                const response = await fetch(csvUrl);
                if (!response.ok) throw new Error(`找不到 ${currentProductName} 的歷史資料。`);

                const csvText = await response.text();
                const lines = csvText.trim().split('\n');
                
                currentDates = [];
                currentPrices = [];

                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(',');
                    if (cols.length >= 2) {
                        currentDates.push(cols[0].trim()); 
                        currentPrices.push(parseFloat(cols[1].trim())); 
                    }
                }
                updateChartDisplay(); // 下載完畢後呼叫畫圖

            } catch (error) {
                alert(error.message);
                if (myChart) myChart.destroy();
            }
        }

        function renderChart(label, dates, prices) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            if (myChart) myChart.destroy();

            // 取得使用者設定的均線週期 (若空白或不合法則預設為 5)
            const maPeriod = parseInt(document.getElementById('maPeriodInput').value) || 5;
            
            // 透過剛才寫好的函數計算出均線陣列
            const smaData = calculateSMA(prices, maPeriod);

            // 背景漸層
            let gradient = ctx.createLinearGradient(0, 0, 0, 600);
            gradient.addColorStop(0, 'rgba(0, 255, 255, 0.5)'); 
            gradient.addColorStop(1, 'rgba(0, 255, 255, 0.0)');

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [
                        {
                            label: `${label} (單位: USD)`,
                            data: prices,
                            borderColor: '#00ffff',     
                            backgroundColor: gradient,  
                            borderWidth: 4,             
                            pointBackgroundColor: '#121212', 
                            pointBorderColor: '#00ffff',     
                            pointBorderWidth: 3,
                            pointRadius: 5,             
                            pointHoverRadius: 10,       
                            pointHoverBackgroundColor: '#f1c40f', 
                            pointHoverBorderColor: '#fff',
                            fill: true,
                            tension: 0.1,
                            order: 2 // 確保主價格線在下面，均線疊在上面
                        },
                        {
                            // === 新增的 SMA 移動平均線 ===
                            label: `SMA (${maPeriod}) 均線`,
                            data: smaData,
                            borderColor: '#ff6600', // 鮮豔螢光橘色
                            borderWidth: 5,         // 更粗的線條凸顯趨勢
                            pointRadius: 0,         // 均線隱藏資料點讓畫面乾淨
                            pointHoverRadius: 7,    // 滑鼠碰到時才顯示橘色圓點
                            pointBackgroundColor: '#121212',
                            pointHoverBackgroundColor: '#ff6600',
                            fill: false,
                            tension: 0.4,           // 均線圓滑處理
                            order: 1 
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: {
                            labels: {
                                color: '#e0e0e0', // 圖例文字改為亮白偏灰
                                font: { size: globalFontSize + 4, weight: 'bold', family: '"Microsoft JhengHei", sans-serif' }
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(20, 20, 20, 0.95)',
                            borderColor: '#333',
                            borderWidth: 2,
                            titleColor: '#f1c40f', 
                            bodyColor: '#ffffff',  
                            titleFont: { size: globalFontSize + 2, weight: 'bold' },
                            bodyFont: { size: globalFontSize + 4, weight: 'bold' }, 
                            padding: 15,
                            usePointStyle: true, // 提示框前面顯示圓點而非方塊
                            callbacks: {
                                label: function(context) {
                                    // 判斷是主價格還是均線，加上前綴符號
                                    let value = context.parsed.y;
                                    let datasetLabel = context.dataset.label;
                                    return `  ${datasetLabel}： ${value} $`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: '#333333' }, 
                            ticks: {
                                color: '#e0e0e0',
                                font: { size: globalFontSize, weight: 'bold' },
                                maxRotation: 45, minRotation: 45
                            }
                        },
                        y: {
                            grid: { color: '#333333', borderDash: [5, 5] },
                            ticks: {
                                color: '#00ffff', 
                                font: { size: globalFontSize + 2, weight: 'bold' },
                                callback: function(value) { return value + ' $'; }
                            }
                        }
                    }
                }
            });
        }

        window.addEventListener('DOMContentLoaded', loadChartData);
    </script>
</body>
</html>
