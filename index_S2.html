<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAM & GPU 報價動態儀表板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: #1e293b;
            font-size: 2.2rem;
            margin-bottom: 25px;
            font-weight: 800;
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            gap: 15px;
        }
        .controls label {
            font-size: 1.2rem;
            font-weight: bold;
            color: #475569;
        }
        select {
            padding: 12px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            background-color: #f8fafc;
            cursor: pointer;
            outline: none;
            transition: all 0.3s;
            color: #0f172a;
        }
        select:hover {
            border-color: #94a3b8;
        }
        select:focus {
            border-color: #00d2ff;
            box-shadow: 0 0 0 4px rgba(0, 210, 255, 0.2);
        }
        .chart-wrapper {
            position: relative;
            height: 55vh;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📈 歷史報價與趨勢互動分析</h1>
        
        <div class="controls">
            <label for="productSelect">選擇分析項目：</label>
            <select id="productSelect" onchange="loadChartData()">
                <optgroup label="AI 伺服器 GPU">
                    <option value="H100">NVIDIA H100</option>
                    <option value="H200">NVIDIA H200</option>
                    <option value="B200">NVIDIA B200</option>
                    <option value="A100">NVIDIA A100</option>
                    <option value="5090">RTX 5090</option>
                </optgroup>
                <optgroup label="大盤價格指數">
                    <option value="DRAM Idx">DRAM 大盤指數 (DRAM Idx)</option>
                    <option value="NAND Idx">NAND 大盤指數 (NAND Idx)</option>
                </optgroup>
                <optgroup label="記憶體顆粒 (DRAM)">
                    <option value="D4 16G 3200">D4 16G 3200</option>
                    <option value="D4 8G 3200">D4 8G 3200</option>
                    <option value="D4 8G eTT">D4 8G eTT</option>
                    <option value="D5 16G 4800">D5 16G 4800</option>
                </optgroup>
            </select>
        </div>

        <div class="chart-wrapper">
            <canvas id="priceChart"></canvas>
        </div>
    </div>

    <script>
        let myChart = null; // 儲存圖表實例

        async function loadChartData() {
            const productName = document.getElementById('productSelect').value;
            // 確保路徑指向您的「報價資料夾」
            const csvUrl = `報價資料夾/${productName}.csv`;

            try {
                const response = await fetch(csvUrl);
                if (!response.ok) {
                    throw new Error(`找不到 ${productName} 的資料，請確認 Python 是否已成功抓取並存檔。`);
                }

                const csvText = await response.text();
                const lines = csvText.trim().split('\n');
                
                const dates = [];
                const prices = [];

                // 從第 2 行開始解析 (跳過 Date,Price,Day,30D 標題行)
                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(',');
                    if (cols.length >= 2) {
                        dates.push(cols[0].trim()); 
                        prices.push(parseFloat(cols[1].trim())); 
                    }
                }

                renderChart(productName, dates, prices);

            } catch (error) {
                console.error(error);
                alert(error.message);
                if (myChart) myChart.destroy();
            }
        }

        function renderChart(label, dates, prices) {
            const ctx = document.getElementById('priceChart').getContext('2d');

            if (myChart) {
                myChart.destroy(); // 畫新圖前先清除舊圖
            }

            // 建立一個漸層顏色讓圖表更酷炫
            let gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(0, 210, 255, 0.6)'); // 頂部較不透明的鮮豔藍
            gradient.addColorStop(1, 'rgba(58, 123, 213, 0.05)'); // 到底部漸漸透明

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: `${label} 價格走勢`,
                        data: prices,
                        borderColor: '#00d2ff', // 鮮豔的霓虹藍
                        backgroundColor: gradient, // 使用漸層填滿
                        borderWidth: 3, // 線條加粗
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#00d2ff',
                        pointBorderWidth: 2,
                        pointRadius: 5,       // 資料點變大
                        pointHoverRadius: 8,  // 滑鼠移過去時資料點放得更大
                        fill: true,
                        tension: 0.3 // 線條平滑度
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        // 強化滑鼠懸停顯示的數值框
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.95)',
                            titleFont: { size: 16, weight: 'bold' }, // 日期字體放大
                            bodyFont: { size: 18, weight: 'bold' },  // 價格字體放大
                            padding: 15,
                            displayColors: false, // 隱藏多餘的顏色小方塊
                            callbacks: {
                                label: function(context) {
                                    return ' 價格: ' + context.parsed.y + ' USD';
                                }
                            }
                        },
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                font: { size: 18, family: "'Segoe UI', sans-serif", weight: 'bold' },
                                color: '#1e293b'
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { 
                                maxRotation: 45, 
                                minRotation: 45,
                                font: { size: 14, weight: 'bold' }, // X軸日期字體放大加粗
                                color: '#475569'
                            },
                            title: {
                                display: true,
                                text: '📅 報價日期',
                                font: { size: 16, weight: 'bold' },
                                color: '#334155'
                            }
                        },
                        y: {
                            grid: { color: '#e2e8f0', borderDash: [5, 5] },
                            beginAtZero: false,
                            ticks: {
                                font: { size: 14, weight: 'bold' }, // Y軸價格字體放大加粗
                                color: '#475569'
                            },
                            title: {
                                display: true,
                                text: '💰 價格 (USD)',
                                font: { size: 16, weight: 'bold' },
                                color: '#334155'
                            }
                        }
                    }
                }
            });
        }

        // 網頁載入完成後，自動觸發一次畫圖
        window.addEventListener('DOMContentLoaded', loadChartData);
    </script>
</body>
</html>
